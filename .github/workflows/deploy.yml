name: Deploy Static Site

on:
  schedule:
    # Run every 2 hours (00:00, 02:00, 04:00, 06:00, 08:00, 10:00, 12:00, 14:00, 16:00, 18:00, 20:00, 22:00 UTC)
    - cron: '0 */2 * * *'

  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages and updating history.json
permissions:
  contents: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        run: |
          git clone --no-checkout "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git checkout "${GITHUB_SHA}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run Build Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          pip install --break-system-packages yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg
          python build.py

      - name: Commit history changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update history database [skip ci]" && git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main)
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Deploy to GitHub Pages
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
