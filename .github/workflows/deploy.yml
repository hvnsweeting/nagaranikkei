name: Deploy Static Site

on:
  schedule:
    # Run every 6 hours (00:00, 06:00, 12:00, 18:00 UTC / 9:00 AM, 3:00 PM, 9:00 PM, 3:00 AM JST)
    - cron: '0 */6 * * *'

  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages and updating history.json
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Fetch all history for push capabilities

      - name: Run Build Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python build.py

      - name: Commit history changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update history database [skip ci]" && git push origin main)

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1

        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
